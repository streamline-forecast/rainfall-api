name: Update MRMS 24-Hour Rolling Archive

on:
  schedule:
    # Run at :10 past every hour — MRMS data is typically posted by :05
    - cron: "10 * * * *"
  workflow_dispatch:  # manual trigger from the Actions UI

jobs:
  update-mrms:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # 24 files takes longer than the MVP single-file run

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install GDAL system tools
      # -----------------------------------------------------------------------
      - name: Install GDAL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gdal-bin \
            libgdal-dev \
            python3-gdal
          gdal_translate --version

      # -----------------------------------------------------------------------
      # 3. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # -----------------------------------------------------------------------
      # 4. Install Python dependencies
      # -----------------------------------------------------------------------
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install numpy Pillow boto3
          pip install gdal==$(gdal-config --version)

      # -----------------------------------------------------------------------
      # 5. Run the 24-hour archive script
      # -----------------------------------------------------------------------
      - name: MRMS 24-hr → PNG + GeoTIFF + GRIB2 → R2
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL:   ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          python scripts/mrms_to_png.py

      # -----------------------------------------------------------------------
      # 6. Print output URLs on success
      # -----------------------------------------------------------------------
      - name: Print output URLs
        if: success()
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          echo "Index  : ${R2_PUBLIC_BASE_URL}/mrms/hourly/index.json"
          echo "Latest : ${R2_PUBLIC_BASE_URL}/mrms_latest.png"

      # -----------------------------------------------------------------------
      # 7. Report failure
      # -----------------------------------------------------------------------
      - name: Report failure
        if: failure()
        run: |
          echo "MRMS 24-hr archive failed at $(date -u). Check logs above."
