name: Update MRMS 24-Hour Rolling Archive

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

jobs:
  update-mrms:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 \
            python3-pip \
            gdal-bin \
            libgdal-dev
          python3 --version
          gdal-config --version
          gdal_translate --version

      - name: Install Python dependencies
        run: |
          python3 -m pip install --break-system-packages --upgrade pip
          python3 -m pip install --break-system-packages numpy Pillow boto3
          python3 -m pip install --break-system-packages GDAL==$(gdal-config --version)

      - name: MRMS 24-hr → PNG + GeoTIFF + GRIB2 → R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          python3 scripts/mrms_to_png.py

      - name: Print output URLs
        if: success()
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          echo "Index  : ${R2_PUBLIC_BASE_URL}/mrms/hourly/index.json"
          echo "Latest : ${R2_PUBLIC_BASE_URL}/mrms_latest.png"

      - name: Report failure
        if: failure()
        run: |
          echo "MRMS 24-hr archive failed at $(date -u). Check logs above."
