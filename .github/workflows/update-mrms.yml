name: Update MRMS Rainfall Overlay

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

jobs:
  update-mrms:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 \
            python3-pip \
            python3-numpy \
            python3-pil \
            python3-gdal \
            gdal-bin \
            libgdal-dev
          python3 --version
          gdal_translate --version

      - name: Install upload dependencies
        run: |
          python3 -m pip install --break-system-packages --upgrade pip
          python3 -m pip install --break-system-packages boto3

      - name: MRMS → PNG → R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          python3 scripts/mrms_to_png.py

      - name: Print output URL
        if: success()
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          echo "PNG available at: ${R2_PUBLIC_BASE_URL}/mrms_latest.png"

      - name: Report failure
        if: failure()
        run: |
          echo "MRMS processing failed at $(date -u). Check the logs above."

      - name: Report failure
        if: failure()
        run: |
          echo "MRMS processing failed at $(date -u). Check the logs above."
