name: Update Combined 42-Hour Accumulation

on:
  workflow_dispatch:
  schedule:
    - cron: "45 * * * *"

jobs:
  update-combined-accum:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 \
            python3-pip \
            python3-numpy \
            python3-pil \
            python3-gdal \
            gdal-bin \
            libgdal-dev
          python3 --version
          gdal_translate --version

      - name: Install upload dependencies
        run: |
          python3 -m pip install --break-system-packages --upgrade pip
          python3 -m pip install --break-system-packages boto3

      - name: Build combined 42-hour accumulation
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          python3 scripts/build_combined_accum.py

      - name: Print output URLs
        if: success()
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          echo "Combined Index: ${R2_PUBLIC_BASE_URL}/combined/accum/index.json"
          echo "Combined PNG  : ${R2_PUBLIC_BASE_URL}/combined/accum/png/combined_42h.png"
          echo "Combined TIF  : ${R2_PUBLIC_BASE_URL}/combined/accum/geotiff/combined_42h.tif"

      - name: Report failure
        if: failure()
        run: |
          echo "Combined 42-hour accumulation failed at $(date -u). Check logs above."
