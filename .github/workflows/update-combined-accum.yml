name: Update Combined 42h Accumulation

on:
  schedule:
    # Run every 30 minutes at :15 and :45 (offset from other workflows)
    - cron: '15,45 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Permissions for R2 upload
    permissions:
      contents: read # Allow checkout
      id-token: write # Required for OIDC authentication if using AWS role, but not for direct keys

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Ensure a compatible Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gdal==$(gdal-config --version | awk -F'.' '{print $1"."$2}') # Install GDAL matching system GDAL
          pip install boto3 requests numpy
        env:
          # Ensure gdal-bin is installed for gdal-config to work
          DEBIAN_FRONTEND: noninteractive
          PYTHON_IMAGE_EXTRA_PACKAGES: gdal-bin libgdal-dev

      - name: Print GDAL version
        run: gdal-config --version || echo "GDAL not found or gdal-config failed."

      - name: Execute combined accumulation script
        run: python scripts/build_combined_accum.py
        env:
          # R2 Credentials from GitHub Secrets
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
